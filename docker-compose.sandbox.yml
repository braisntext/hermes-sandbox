#
# docker-compose.sandbox.yml — Hermes sandbox evaluation environment
#
# Usage:
#   HERMES_UID=$(id -u) HERMES_GID=$(id -g) docker compose -f docker-compose.sandbox.yml up -d
#
# Fill in .env.sandbox with at least one LLM provider key before starting.
# All data (config, logs, sessions, skills) is stored in ./workspace_test
# and never touches ~/.hermes on the host.
#
services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent-sandbox
    container_name: hermes-sandbox
    restart: unless-stopped
    env_file:
      - .env.sandbox
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # Dashboard is launched as a sidecar inside the same container
      # so we don't need a second service. It binds to 0.0.0.0:9119
      # inside the container and is reachable at http://localhost:9119.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
    volumes:
      # Isolated data volume — replaces ~/.hermes on a normal install.
      # All config, logs, sessions, skills, and crons land here.
      - ./workspace_test:/opt/data
      # --- Proyectos montados para que Hermes pueda leer/escribir ---
      - /Users/brais/VSCODE/FinView:/workspace/FinView
      - /Users/brais/VSCODE/WorldHawk:/workspace/WorldHawk
      - /Users/brais/VSCODE/grow-shop:/workspace/grow-shop
      - /Users/brais/VSCODE/bl-site-package:/workspace/bl-site-package
      - /Users/brais/VSCODE/biglobster:/workspace/biglobster
    ports:
      # Dashboard + /api/delegate — bind to all interfaces so ngrok can tunnel it
      - "9119:9119"
    networks:
      - hermes-net
    # sleep infinity keeps the container alive while the dashboard sidecar
    # (HERMES_DASHBOARD=1) serves the FastAPI server on port 9119.
    # No gateway needed — we only use the dashboard's /api/delegate endpoint.
    command: ["sleep", "infinity"]

networks:
  hermes-net:
    driver: bridge
