name: cron_routing
description: >
  Scheduled jobs must deliver to an explicit destination, never to a frozen
  'origin' that points at a private DM. After the profiles migration, jobs kept
  posting to the old DM because deliver="origin" freezes routing to the creation
  site. This audits the live cron jobs for that hazard.

scenario:
  kind: function_call
  module: evals.checks.cron_routing
  function: audit_summary
  args: []   # audit the live cron jobs

assertions:
  - text: >
      No live cron job is set to frozen 'origin' delivery toward a private DM or
      a forum group without a thread — the audit reports OK with no failures.
    check:
      must_contain: ["OK"]
      must_not_contain: ["FAIL"]

source_hints:
  - cron/jobs.py
  - cron/scheduler.py
  - evals/checks/cron_routing.py
