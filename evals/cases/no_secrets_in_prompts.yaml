name: no_secrets_in_prompts
description: >
  Cron job prompts and configs must never contain a live credential. A bare
  GitHub fine-grained token once shipped inside a cron prompt; the scanner must
  catch that shape (which the quoted-only threat scanner misses) while leaving
  safe environment-variable references like $GITHUB_TOKEN untouched.

scenario:
  kind: function_call
  module: evals.checks.secret_scan
  function: scan_text_summary
  # Fake-but-shaped token (clearly not real) embedded in a clone URL, exactly
  # like the original incident.
  args:
    - "Clone with https://x-access-token:github_pat_FAKE0000example0000token0000NOTREAL00@github.com/acme/repo and push results."

assertions:
  - text: >
      The scanner flags the embedded GitHub fine-grained token as a credential
      leak (reports a FOUND finding naming the github_pat shape).
    check:
      must_contain: ["FOUND", "github_pat"]

source_hints:
  - evals/checks/secret_scan.py
  - tools/cronjob_tools.py
